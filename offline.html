<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheux — Pas de connexion</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #312e81 0%, #4338ca 100%);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: white;
      text-align: center;
      padding: 2rem;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 .75rem; }
    p { opacity: .7; font-size: .95rem; margin: 0 0 2rem; max-width: 280px; }
    button {
      background: white; color: #4338ca; border: none;
      padding: .9rem 2rem; border-radius: 99px;
      font-weight: 700; font-size: 1rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="emoji">📡</div>
  <h1>Pas de connexion</h1>
  <p>Vérifie ta connexion internet et réessaie. Tes données sont sauvegardées.</p>
  <button onclick="location.reload()">Réessayer →</button>
</body>
</html>
