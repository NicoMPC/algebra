<head>

  <script>

      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script src="6.js"></script><script src="5.js"></script><script src="4.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; margin: 0; color: #0f172a; overflow-x: hidden; }
    
    .math-display { font-size: 1.3rem; line-height: 1.5; font-weight: 700; text-align: left; white-space: pre-wrap !important; word-break: break-word; overflow-x: auto; overflow-y: hidden; }
    @media (min-width: 1024px) { .math-display { font-size: 1.6rem; } }
    
    .main-box { min-height: 80px; transition: all 0.3s ease; position: relative; }
    
    .symbol-btn { padding: 0.5rem 0.5rem; font-size: 1.1rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.75rem; transition: all 0.2s; color: #334155; font-weight: 600; cursor: pointer; }
    .symbol-btn:hover { background: #e2e8f0; transform: translateY(-1px); }
    
    textarea#text-draft { font-size: 1.1rem; padding: 1rem; border-radius: 1rem; background: #ffffff; border: 2px dashed #cbd5e1; width: 100%; min-height: 250px; outline: none; color: #1e293b; transition: all 0.3s; font-family: monospace; resize: vertical; }
    textarea#text-draft:focus { border-color: #3b82f6; border-style: solid; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1); }
    
    #draw-canvas, #draw-canvas-draft, #laser-canvas, #laser-canvas-draft { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; cursor: crosshair; }
    .drawing-mode #draw-canvas, .drawing-mode-draft #draw-canvas-draft { pointer-events: auto; z-index: 12; }
    .laser-mode #laser-canvas, .laser-mode-draft #laser-canvas-draft { pointer-events: auto; z-index: 12; }
    
    .blurred-formula { filter: blur(6px); transition: all 0.4s ease; cursor: pointer; user-select: none; overflow-x: auto; white-space: pre-wrap; word-break: break-word; opacity: 0.8; }
    .blurred-formula.revealed { filter: blur(0); opacity: 1; }
    
    @keyframes bounce-in { 0% { transform: scale(0.95) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }

    @keyframes success-pop { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    .animate-success-pop { animation: success-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    .loader { border: 4px solid #f1f5f9; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* QCM Vertical exclusif */
    .option-btn { border: 2px solid #e2e8f0; transition: all 0.2s; text-align: left; padding: 1.2rem 1.5rem; border-radius: 1rem; font-weight: 600; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .option-btn.cursor-pointer:hover { border-color: #60a5fa; background: #f0fdf4; transform: translateX(4px); box-shadow: 0 4px 6px rgba(59, 130, 246, 0.1); }
    .option-correct { border-color: #10b981 !important; background: #ecfdf5 !important; color: #065f46; z-index: 10; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
    .option-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b; opacity: 0.8; }
    .option-neutral { opacity: 0.5; background: #f8fafc; pointer-events: none; border-color: #e2e8f0 !important; }

    /* Tiroir Brouillon */
    #draft-drawer { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    #draft-drawer.open { transform: translateX(0); }
    
    /* Custom Scrollbar */

<script>
// ==========================================================
// CONFIGURATION GOOGLE SCRIPT & CONSTANTES
// ==========================================================
// TA NOUVELLE URL AVEC LA RÉCUPÉRATION DE DONNÉES CLOUD :
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjZDHosS4Ga9nl_i88mH-zvpTkwcTlCm069whhvGlO0y5U-XXLbVxzJuRkFqpaOc3I1w/exec";
const ADMIN_PASSWORD = "NICO"; 

let state = {
  activeProfile: null, niveau: "4EME", results: {}, xp: 0, streak: 0,
  questView: {}, expanded: {}, revealed: false, isScored: false, currentId: null,
  hintStepsRevealed: {}, formulaRevealed: {}, formulaManuallyTouched: {},
  qcmAnswered: {},
  isDrawing: false, isLaser: false, draftOpen: false, sessionCount: 1, tutorialDone: false
};

const STORAGE_KEY_LOCAL = 'boost_local_progress'; 
const SESSION_KEY = 'boost_active_user'; 
const LEVEL_ORDER = ["6EME", "5EME", "4EME", "3EME", "SECONDE", "PREMIERE", "TERMINALE"];
const LEVEL_NAMES = { "6EME": "6ème", "5EME": "5ème", "4EME": "4ème", "3EME": "3ème", "SECONDE": "Seconde", "PREMIERE": "1ère", "TERMINALE": "Terminale" };
const EMOJIS = ['📘', '🧮', '📐', '🚀', '💡', '🎯', '⚡', '🔥'];
const LEVELS = {}; 

function showCustomAlert(title, message, icon = '⚠️') {
  document.getElementById('alert-icon').innerText = icon;
  document.getElementById('alert-title').innerText = title;
  document.getElementById('alert-message').innerText = message;
  document.getElementById('custom-alert').classList.remove('hidden');
}
function closeCustomAlert() { document.getElementById('custom-alert').classList.add('hidden'); }

// Init DB
Object.keys(LEVEL_NAMES).forEach(k => { LEVELS[k] = { categories: {}, catDisplay: {}, catIcon: {}, name: LEVEL_NAMES[k] }; });

// --- ÉLÈVE : INSCRIPTION ---
async function registerStudent() {
  const name = document.getElementById('reg-name').value.trim();
  const level = document.getElementById('reg-level').value;
  const email = document.getElementById('reg-email').value.trim();
  if (!name) return showCustomAlert("Oops !", "Ton prénom est indispensable.", "👋");

  const loader = document.getElementById('reg-loader'); const textBtn = document.getElementById('reg-text');
  loader.classList.remove('hidden'); textBtn.classList.add('hidden');

  const code = (name.substring(0, 3).toUpperCase() + level.charAt(0) + Math.floor(Math.random() * 90 + 10)).replace(/\s/g, '');

  try {
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "create_profile", code: code, name: name, level: level, email: email }) });
    state.activeProfile = { code: code, name: name, level: level, email: email };
    localStorage.setItem(SESSION_KEY, code);
    
    document.getElementById('login-screen').classList.add('hidden');
    showCustomAlert("🎉 Compte créé !", `Bienvenue ${name}.\n\nTon code secret est :\n${code}\n\nNote-le bien !`, "🎓");
    initStudentApp();
  } catch(e) { showCustomAlert("Erreur", "Problème de connexion au serveur.", "🔌"); } finally { loader.classList.add('hidden'); textBtn.classList.remove('hidden'); }
}

// --- ÉLÈVE : CONNEXION & SYNCHRONISATION CLOUD ---
document.addEventListener('DOMContentLoaded', () => { 
  populateLevelsFromDb(); 
  const savedCode = localStorage.getItem(SESSION_KEY);
  if (savedCode) silentLogin(savedCode);
  document.getElementById('student-code-input').addEventListener('keypress', function (e) { if (e.key === 'Enter') loginWithCode(); });
});

async function loginWithCode() {
  const codeInput = document.getElementById('student-code-input').value.trim().toUpperCase();
  if(!codeInput) return;
  
  const loader = document.getElementById('login-loader'); const textBtn = document.getElementById('login-text-btn');
  loader.classList.remove('hidden'); textBtn.classList.add('hidden');

  try {
    // ON TÉLÉCHARGE LES DONNÉES DU CLOUD !
    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_user_data&code=${codeInput}`); 
    const data = await response.json();
    
    if (data.status === "success" && data.profile) { 
      state.activeProfile = data.profile; 
      localStorage.setItem(SESSION_KEY, codeInput); 
      rebuildStateFromHistory(data.history); // Reconstruction de l'historique !
      initStudentApp(); 
    } else { 
      document.getElementById('student-code-input').classList.add('animate-shake', 'border-rose-400');
      setTimeout(() => document.getElementById('student-code-input').classList.remove('animate-shake', 'border-rose-400'), 500);
      showCustomAlert("Code Inconnu", "Ce code n'existe pas.", "🕵️"); 
    }
  } catch(e) { showCustomAlert("Erreur", "Impossible de contacter le serveur.", "🌐"); } finally { loader.classList.add('hidden'); textBtn.classList.remove('hidden'); }
}

async function silentLogin(code) {
  try {
    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_user_data&code=${code}`);
    const data = await response.json();
    if (data.status === "success" && data.profile) { 
      state.activeProfile = data.profile; 
      rebuildStateFromHistory(data.history); 
      initStudentApp(); 
    }
  } catch(e) { console.log("Silent login failed"); }
}

function rebuildStateFromHistory(history) {
    state.results = {}; state.xp = 0; state.hintStepsRevealed = {}; state.formulaRevealed = {};
    if(!history) return;
    
    history.forEach(row => {
        // L'indice d'exercice venant de Google Sheet est +1 par rapport au JS
        const jsIdx = parseInt(row.exercice_idx) - 1; 
        const id = `${row.niveau}-${row.categorie}-${jsIdx}`;
        
        state.results[id] = row.resultat;
        if (row.indices > 0) state.hintStepsRevealed[id] = row.indices;
        if (row.formule) state.formulaRevealed[id] = true;
        state.xp += parseInt(row.xp) || 0;
    });
}

function initStudentApp() {
  state.niveau = state.activeProfile.level; 
  // Gérer le Streak localement
  const localData = JSON.parse(localStorage.getItem(STORAGE_KEY_LOCAL)) || {};
  const code = state.activeProfile.code;
  if(!localData[code]) localData[code] = { streak: 1, lastLogin: new Date().toISOString().split('T')[0], tutorialDone: false };
  const p = localData[code];
  const today = new Date().toISOString().split('T')[0];
  
  if (!sessionStorage.getItem('session_counted')) {
       sessionStorage.setItem('session_counted', 'true');
       if (p.lastLogin && p.lastLogin !== today) { 
           const diff = Math.ceil(Math.abs(new Date(today) - new Date(p.lastLogin)) / (86400000)); 
           p.streak = (diff === 1) ? (p.streak || 0) + 1 : 1; 
       }
       p.lastLogin = today;
       localStorage.setItem(STORAGE_KEY_LOCAL, JSON.stringify(localData));
  }
  
  state.streak = p.streak || 1;
  state.tutorialDone = p.tutorialDone === undefined ? false : p.tutorialDone;

  document.getElementById('login-screen').classList.add('hidden'); 
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('active-student-name').innerText = state.activeProfile.name;
  
  updateLevelDropdown(state.niveau); 
  generateBoostDuJour(); // LE COACH VIRTUEL SE LANCE
  updateHeader(); 
  render();
}

function logout() { sessionStorage.removeItem('session_counted'); localStorage.removeItem(SESSION_KEY); location.reload(); }

function finishTutorial() {
    state.tutorialDone = true;
    const localData = JSON.parse(localStorage.getItem(STORAGE_KEY_LOCAL)) || {};
    if(localData[state.activeProfile.code]) localData[state.activeProfile.code].tutorialDone = true;
    localStorage.setItem(STORAGE_KEY_LOCAL, JSON.stringify(localData));
    render();
}

function sendScoreToSheet(cat, idx, status, xpGained) {
  const id = `${state.niveau}-${cat}-${idx}`;
  const indicesVue = state.hintStepsRevealed[id] || 0;
  const formuleVue = !!(state.formulaRevealed[id] || state.formulaManuallyTouched[id]);

  fetch(GOOGLE_SCRIPT_URL, { 
    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, 
    body: JSON.stringify({ action: "save_score", code: state.activeProfile.code, name: state.activeProfile.name, level: state.niveau, categorie: cat, exercice_idx: idx + 1, resultat: status, indices: indicesVue, formule: formuleVue, xp: xpGained }) 
  }).catch(e => console.log("Sauvegarde silencieuse."));
}

function mark(cat, idx, status, total) {
  const id = `${state.niveau}-${cat}-${idx}`;
  state.results[id] = status; state.formulaRevealed[id] = true; state.isScored = true;

  let xpGained = 0;
  if(status !== 'HARD') {
    let gained = 100 - ((state.hintStepsRevealed[id]||0)*15) - (state.formulaManuallyTouched[id]?25:0);
    if(status === 'EASY') gained *= 1.2;
    xpGained = Math.max(10, Math.floor(gained));
    state.xp += xpGained;
  }

  sendScoreToSheet(cat, idx, status, xpGained); updateHeader(); render();
}

// --- LE GARDE DU CORPS & LE COACH VIRTUEL ---

function updateLevelDropdown(userLevel) {
  const select = document.getElementById('niveau-select'); 
  select.innerHTML = ''; 
  const maxIdx = LEVEL_ORDER.indexOf(userLevel);
  // RESTRICTION : On n'affiche que le niveau actuel et le niveau précédent
  const startIdx = Math.max(0, maxIdx - 1); 
  
  for(let i = startIdx; i <= maxIdx; i++) { 
      const lvlKey = LEVEL_ORDER[i]; 
      const opt = document.createElement('option'); 
      opt.value = lvlKey; 
      opt.text = LEVEL_NAMES[lvlKey]; 
      select.appendChild(opt); 
  }
  select.value = userLevel;
}

function generateBoostDuJour() {
    const cats = LEVELS[state.niveau].categories;
    if (!cats) return;

    let toReview = [];
    let toDiscover = [];

    Object.keys(cats).forEach(catName => {
        if (catName === "BOOST") return; // Éviter la boucle infinie
        cats[catName].forEach((exo, idx) => {
            const id = `${state.niveau}-${catName}-${idx}`;
            const res = state.results[id];
            const hints = state.hintStepsRevealed[id] || 0;

            let weight = 0;
            if (res === 'HARD') weight = 10;
            else if (res === 'MEDIUM') weight = 5;
            else if (hints > 0 && res !== 'EASY') weight = 2;
            else if (!res) weight = 1; // Pas encore fait

            if (weight > 1) toReview.push({ exo, weight });
            else if (weight === 1) toDiscover.push({ exo });
        });
    });

    toReview.sort((a, b) => b.weight - a.weight);
    toDiscover.sort(() => 0.5 - Math.random()); // Mélange aléatoire des nouveaux

    let boostExos = [];
    let reviewCount = Math.min(3, toReview.length); // Max 3 révisions
    for(let i=0; i<reviewCount; i++) boostExos.push(toReview[i].exo);
    
    let newCount = 5 - boostExos.length; // Le reste en nouveautés
    for(let i=0; i<Math.min(newCount, toDiscover.length); i++) boostExos.push(toDiscover[i].exo);

    if (boostExos.length > 0) {
        // Injection de la catégorie BOOST en tête de liste
        const newCats = { "BOOST": boostExos };
        Object.keys(cats).forEach(k => { if(k !== "BOOST") newCats[k] = cats[k]; });
        LEVELS[state.niveau].categories = newCats;
        LEVELS[state.niveau].catDisplay["BOOST"] = "🔥 Ton Boost Quotidien";
        LEVELS[state.niveau].catIcon["BOOST"] = "🎯";
    }
}

function changeNiveau() { 
    state.niveau = document.getElementById('niveau-select').value; 
    generateBoostDuJour(); 
    render(); 
}

// --- UTILITAIRES APP ---
function populateLevelsFromDb() { 
  Object.keys(LEVELS).forEach(key => { 
    const raw = window.db ? window.db[`ALGEBRA_${key}`] : null; 
    if (raw) { const cats = raw.categories || raw; LEVELS[key] = { categories: cats, catDisplay: raw.catDisplay || {}, catIcon: raw.catIcon || {}, name: LEVEL_NAMES[key] }; }
  }); 
}

function updateHeader() { document.getElementById('ui-streak').innerText = state.streak; document.getElementById('ui-xp').innerText = state.xp; }
function toggleDraft() { /* (Même code que la V1 pour le brouillon) */ state.draftOpen = !state.draftOpen; const drawer = document.getElementById('draft-drawer'); const backdrop = document.getElementById('draft-backdrop'); if(state.draftOpen) { drawer.classList.add('open'); backdrop.classList.remove('hidden'); setTimeout(() => backdrop.classList.remove('opacity-0'), 10); setTimeout(() => { document.getElementById('text-draft').focus(); }, 300); } else { drawer.classList.remove('open'); backdrop.classList.add('opacity-0'); setTimeout(() => backdrop.classList.add('hidden'), 300); } }
function clearDraft() { document.getElementById('text-draft').value = ''; const c = document.getElementById('draw-canvas-draft'); if(c) { const ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height); } }
function insertText(text) { const txtArea = document.getElementById('text-draft'); const startPos = txtArea.selectionStart; const endPos = txtArea.selectionEnd; txtArea.value = txtArea.value.substring(0, startPos) + text + txtArea.value.substring(endPos, txtArea.value.length); txtArea.focus(); txtArea.selectionStart = startPos + text.length; txtArea.selectionEnd = startPos + text.length; }

function goToExercise(cat, i) { state.questView[cat] = parseInt(i); state.revealed = false; state.isScored = false; state.currentId = null; render(); }
function nextExercise(cat) { const idx = parseInt(state.questView[cat] || 0); const total = LEVELS[state.niveau].categories[cat].length; if(idx < total-1) { state.questView[cat] = idx + 1; } state.revealed = false; state.isScored = false; state.currentId = null; render(); }

function checkOption(cat, idx, optIdx, buttonEl) {
  const id = `${state.niveau}-${cat}-${idx}`; const data = LEVELS[state.niveau].categories[cat][idx]; const selectedOpt = data.options[optIdx];
  state.qcmAnswered[id] = selectedOpt; state.revealed = true; state.currentId = id;
  const parent = buttonEl.parentElement;
  Array.from(parent.children).forEach(child => { child.className = "option-btn option-neutral cursor-default"; });
  if (selectedOpt === data.a) { buttonEl.className = "option-btn option-correct animate-success-pop cursor-default"; buttonEl.innerHTML = `<span><span class="text-emerald-500 mr-2">✅</span>${selectedOpt}</span>`; } else { buttonEl.className = "option-btn option-wrong animate-shake cursor-default"; buttonEl.innerHTML = `<span><span class="text-rose-500 mr-2">❌</span>${selectedOpt}</span>`; const correctIdx = data.options.indexOf(data.a); if(correctIdx !== -1 && parent.children[correctIdx]) { parent.children[correctIdx].className = "option-btn option-correct cursor-default"; parent.children[correctIdx].innerHTML = `<span><span class="text-emerald-500 mr-2">✅</span>${data.a}</span>`; } }
  setTimeout(() => render(), 800);
}

function verify(cat, idx) { state.revealed = true; state.isScored = false; state.currentId = `${state.niveau}-${cat}-${idx}`; render(); }
function toggleCategory(cat) { state.expanded[cat] = !state.expanded[cat]; render(); }
function showNextHint(id, total) { if(!state.hintStepsRevealed[id]) state.hintStepsRevealed[id] = 0; if(state.hintStepsRevealed[id] < total) { document.getElementById(`hint-${id}-${state.hintStepsRevealed[id]}`).classList.remove('hidden'); document.getElementById(`hint-${id}-${state.hintStepsRevealed[id]}`).classList.add('animate-fade-in'); state.hintStepsRevealed[id]++; } }
function revealFormula(id, el) { el.classList.add('revealed'); state.formulaManuallyTouched[id] = true; }

// DESSIN ET LASER SIMPLIFIÉS
function toggleDraftDrawingMode() {} function toggleDraftLaserMode() {} function toggleDrawingMode(id) {} function toggleLaserMode(id) {}

// --- RENDU VISUEL ---
function render() {
  const container = document.getElementById('app-container'); let html = `<div class="space-y-5">`; const cats = LEVELS[state.niveau].categories || {}; let emojiIdx = 0;
  Object.keys(cats).forEach(cat => {
    const total = cats[cat].length; let completed = 0;
    for(let i=0; i<total; i++) { if(state.results[`${state.niveau}-${cat}-${i}`] === 'EASY' || state.results[`${state.niveau}-${cat}-${i}`] === 'MEDIUM') completed++; }
    const pct = total > 0 ? Math.round((completed/total)*100) : 0; const isCompleted = completed === total && total > 0;
    const icon = LEVELS[state.niveau].catIcon[cat] || EMOJIS[emojiIdx % EMOJIS.length]; emojiIdx++;
    
    // Le "BOOST" a une couleur spéciale
    const isBoost = cat === "BOOST";
    const bgClass = isCompleted ? 'bg-emerald-50/50 border-emerald-200' : (isBoost ? 'bg-orange-50/30 border-orange-200 shadow-orange-100/50 shadow-lg' : 'bg-white border-slate-200');
    const titleColor = isCompleted ? 'text-emerald-800' : (isBoost ? 'text-orange-600' : 'text-slate-800');

    html += `<div class="rounded-3xl shadow-sm border overflow-hidden transition-all duration-300 ${bgClass}">
      <div onclick="toggleCategory('${cat}')" class="px-5 py-5 flex justify-between items-center cursor-pointer hover:bg-slate-50/50 transition-colors">
        <div class="flex items-center gap-4 w-full">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm border ${isBoost?'border-orange-200':'border-slate-100'} flex items-center justify-center text-2xl shrink-0">${icon}</div>
          <div class="flex-1 pr-4">
            <span class="text-lg font-black ${titleColor}">${LEVELS[state.niveau].catDisplay[cat]||cat} ${isCompleted ? '🏆' : ''}</span>
            <div class="w-full max-w-xs flex items-center gap-3 mt-1.5">
              <div class="flex-1 bg-slate-200 rounded-full h-1.5 overflow-hidden"><div class="bg-${isBoost?'orange':'blue'}-500 h-1.5 rounded-full transition-all duration-500 ease-out" style="width: ${pct}%"></div></div>
              <span class="text-xs text-slate-500 font-bold min-w-[2rem]">${pct}%</span>
            </div>
          </div>
        </div>
        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 transition-transform duration-300 ${state.expanded[cat]?'rotate-180':''}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg></div>
      </div>
      ${state.expanded[cat] ? renderSection(cat, cats[cat][state.questView[cat]||0], parseInt(state.questView[cat]||0), total) : ''}
    </div>`;
  });
  container.innerHTML = html + `</div>`;
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise(); 
}

function renderSection(cat, data, idx, total) {
  if (!data) return `<div class="p-10 text-center font-bold text-emerald-600">Catégorie terminée !</div>`;
  const id = `${state.niveau}-${cat}-${idx}`; 
  const isRev = state.revealed && state.currentId === id;
  const hasOptions = data.options && Array.isArray(data.options) && data.options.length > 0;

  let pills = `<div class="flex flex-wrap gap-2 p-4 justify-center border-t border-slate-100 bg-slate-50/50">`;
  for(let i=0; i<total; i++) {
    const st = state.results[`${state.niveau}-${cat}-${i}`];
    let c = "w-9 h-9 rounded-xl text-sm font-bold flex items-center justify-center cursor-pointer transition-all duration-200 ";
    c += (st === 'EASY' || st === 'MEDIUM') ? "bg-emerald-500 text-white shadow-sm" : (st === 'HARD' ? "bg-rose-400 text-white shadow-sm" : "bg-white border border-slate-200 text-slate-600 hover:bg-slate-100");
    if(i===idx) c+=" ring-4 ring-blue-200 scale-110 z-10 font-black";
    pills += `<button onclick="goToExercise('${cat}', ${i})" class="${c}">${i+1}</button>`;
  } pills += `</div>`;

  let actionButtons = ''; 
  const isLastExercise = idx >= total - 1;

  if (!isRev) {
    if (!hasOptions) { actionButtons = `<button onclick="verify('${cat}', ${idx})" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-black text-lg rounded-xl shadow-lg shadow-slate-200 transition-all hover:-translate-y-1">VÉRIFIER</button>`; }
  } else if (!state.isScored) {
    actionButtons = `
      <div class="flex flex-col sm:flex-row gap-3 animate-bounce-in w-full mt-2">
        <button onclick="mark('${cat}', ${idx}, 'HARD', ${total})" class="flex-1 py-4 bg-rose-50 text-rose-600 rounded-xl font-black border border-rose-200 hover:bg-rose-100 transition-colors">🥵 FAUX</button>
        <button onclick="mark('${cat}', ${idx}, 'MEDIUM', ${total})" class="flex-1 py-4 bg-amber-50 text-amber-600 rounded-xl font-black border border-amber-200 hover:bg-amber-100 transition-colors">🤔 HÉSITÉ</button>
        <button onclick="mark('${cat}', ${idx}, 'EASY', ${total})" class="flex-1 py-4 bg-emerald-50 text-emerald-600 rounded-xl font-black border border-emerald-200 hover:bg-emerald-100 transition-colors">😎 FACILE</button>
      </div>`;
  } else {
    if (isLastExercise) { actionButtons = `<button onclick="toggleCategory('${cat}')" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg rounded-xl shadow-lg shadow-emerald-200 transition-all hover:-translate-y-1 mt-2">✅ TERMINER</button>`; } 
    else { actionButtons = `<button onclick="nextExercise('${cat}')" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-xl shadow-lg shadow-blue-200 transition-all hover:-translate-y-1 flex justify-center items-center gap-2 mt-2">EXERCICE SUIVANT</button>`; }
  }

  let finalButtonsHtml = '';
  if (hasOptions) {
    let optionsHtml = `<div class="flex flex-col gap-3 w-full ${isRev ? 'mb-2' : ''}">`;
    data.options.forEach((opt, oIdx) => {
      let btnClass = "option-btn"; let innerText = `<span>${opt}</span>`;
      if (isRev) { btnClass += " cursor-default pointer-events-none"; if (opt === data.a) { btnClass += " option-correct"; innerText = `<span><span class="text-emerald-500 mr-2">✅</span>${opt}</span>`; } else if (opt === state.qcmAnswered[id]) { btnClass += " option-wrong"; innerText = `<span><span class="text-rose-500 mr-2">❌</span>${opt}</span>`; } else { btnClass += " option-neutral"; } } else { btnClass += " cursor-pointer"; }
      optionsHtml += `<button ${!isRev ? `onclick="checkOption('${cat}', ${idx}, ${oIdx}, this)"` : ''} class="${btnClass}">${innerText}</button>`;
    }); optionsHtml += `</div>`; finalButtonsHtml = optionsHtml + actionButtons;
  } else { finalButtonsHtml = actionButtons; }

  const fRevealedClass = (state.formulaRevealed[id] || state.formulaManuallyTouched[id]) ? 'revealed' : '';

  return `
    <div class="bg-white transition-colors animate-fade-in border-t border-slate-100">
      ${pills}
      <div class="p-5 lg:p-8">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
            <span class="bg-blue-50 text-blue-700 text-xs font-black px-3 py-1 rounded-lg uppercase tracking-wider border border-blue-100">Niv. ${data.lvl || 1}</span>
          </div>

          <div id="box-${id}" class="main-box bg-slate-50 border border-slate-200 rounded-3xl p-6 lg:p-8 mb-6 relative overflow-hidden flex flex-col justify-center shadow-inner">
            <div class="relative z-0 w-full overflow-hidden">
              <div class="math-display text-slate-800">${data.q}</div>
              ${isRev && !hasOptions ? `<div class="mt-4 pt-4 border-t-2 border-dashed border-emerald-200 text-3xl lg:text-4xl font-black text-emerald-600 animate-bounce-in text-center break-words">${data.a}</div>` : ''}
              ${isRev && hasOptions && state.qcmAnswered[id] !== data.a ? `<div class="mt-4 pt-4 border-t border-dashed border-slate-300 text-lg font-bold text-slate-500 animate-bounce-in text-center break-words">Correction : ${data.a}</div>` : ''}
            </div>
          </div>

          <div class="flex flex-col gap-2">
            ${finalButtonsHtml}
          </div>

          <div class="mt-8 grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div class="bg-amber-50/50 p-5 rounded-3xl border border-amber-100">
              <button onclick="showNextHint('${id}', ${data.steps ? data.steps.length : 0})" class="w-full text-sm font-bold text-amber-700 bg-amber-100 hover:bg-amber-200 py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">💡 Révéler un indice</button>
              <div class="mt-3 space-y-2">
                ${(data.steps||[]).map((s,i) => `<div id="hint-${id}-${i}" class="hidden text-sm p-3.5 bg-white rounded-xl border border-amber-200 text-amber-900 font-semibold shadow-sm">${s}</div>`).join('')}
              </div>
            </div>
            
            <div class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100 flex flex-col justify-center">
              <p class="text-xs font-black text-indigo-400 uppercase tracking-widest text-center mb-3">Rappel de cours</p>
              <div class="blurred-formula ${fRevealedClass} text-sm lg:text-base bg-white text-indigo-900 font-bold p-4 rounded-xl text-center border border-indigo-200 shadow-sm" onclick="revealFormula('${id}', this)">${data.f || 'Pas de formule spécifique.'}</div>
            </div>
          </div>
      </div>
    </div>`;
}
</script>
