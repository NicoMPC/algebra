<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Algèbre Boost • Espace Élève</title>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'math-field'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="https://unpkg.com/mathlive"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="6.js"></script><script src="5.js"></script><script src="4.js"></script>
  <script src="3.js"></script><script src="2.js"></script><script src="1.js"></script><script src="t.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8f4f0; margin: 0; color: #1e293b; }
    .math-display { font-size: 1.78rem; line-height: 1.55; font-weight: 700; text-align: left; white-space: pre-wrap !important; word-break: break-word; }
    .main-box { min-height: 410px; box-shadow: 0 25px 60px -15px rgb(37 99 235 / 0.25); transition: all 0.3s ease; position: relative; }
    .symbol-btn { padding: 0.75rem 1rem; font-size: 1.4rem; background: #e0f2fe; border-radius: 9999px; transition: background 0.2s; }
    math-field { font-size: 1.5rem; padding: 1rem; border-radius: 1.5rem; background: #f8fafc; border: 3px dashed #cbd5e1; width: 100%; min-height: 250px; outline: none; }
    #draw-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; cursor: crosshair; }
    .drawing-mode #draw-canvas { pointer-events: auto; }
    .blurred-formula { filter: blur(8px); transition: filter 0.3s ease; cursor: pointer; user-select: none; }
    .blurred-formula.revealed { filter: blur(0); }
    @keyframes bounce-in { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 bg-[#f8f4f0] z-50 flex flex-col items-center justify-center p-6">
  <div class="max-w-md w-full text-center">
    <div onclick="askAdmin()" class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl flex items-center justify-center text-5xl shadow-inner mx-auto mb-6 cursor-pointer">📐</div>
    <h1 class="text-4xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Algèbre <span class="text-blue-700">Boost</span></h1>
    
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
      <p class="text-slate-500 font-bold mb-6 uppercase text-sm tracking-widest">Espace Élève</p>
      <input type="text" id="student-code-input" class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-6 py-4 text-2xl font-black text-center focus:outline-none focus:border-blue-600 mb-4" placeholder="TON CODE (EX: LEO4)">
      <button onclick="loginWithCode()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-2xl shadow-lg transition">SE CONNECTER</button>
    </div>
    <p class="mt-8 text-slate-400 text-sm font-medium">Pas encore de code ? Demande à ton coach !</p>
  </div>
</div>

<div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
  <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl relative">
    <button onclick="closeAdmin()" class="absolute top-4 right-4 text-slate-400 text-2xl">✕</button>
    <h2 class="text-2xl font-black mb-6">Créer un accès élève</h2>
    <div class="space-y-4">
      <input type="text" id="new-student-name" class="w-full bg-slate-50 border border-slate-300 rounded-2xl px-5 py-3 font-bold" placeholder="Prénom de l'élève">
      <select id="new-student-level" class="w-full bg-slate-50 border border-slate-300 rounded-2xl px-5 py-3 font-bold">
        <option value="6EME">6ème</option><option value="5EME">5ème</option><option value="4EME" selected>4ème</option>
        <option value="3EME">3ème</option><option value="SECONDE">Seconde</option><option value="PREMIERE">1ère</option><option value="TERMINALE">Terminale</option>
      </select>
      <button onclick="generateStudentAccess()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl">GÉNÉRER LE CODE</button>
      
      <div id="generated-result" class="hidden mt-6 p-4 bg-emerald-50 border-2 border-emerald-200 rounded-2xl text-center">
        <p class="text-emerald-800 font-bold mb-1">Code généré :</p>
        <p id="final-code" class="text-3xl font-black text-emerald-600 tracking-widest"></p>
      </div>
    </div>
  </div>
</div>

<div id="main-app" class="hidden max-w-7xl mx-auto p-6 flex gap-6">
  <div id="main-content" class="flex-1 transition-all">
    <header class="flex justify-between items-center mb-8 bg-white rounded-3xl shadow-xl border border-slate-100 p-6">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-2xl text-white font-bold cursor-pointer" onclick="logout()">📐</div>
        <h1 class="text-2xl font-black text-slate-800">BOOST <span id="active-student-name" class="text-blue-700 ml-2"></span></h1>
      </div>
      <div class="flex items-center gap-3 font-bold">
          <div class="bg-orange-50 text-orange-600 px-3 py-1.5 rounded-xl">🔥 <span id="ui-streak">0</span></div>
          <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-xl">💎 <span id="ui-xp">0</span></div>
          <button onclick="toggleDraft()" class="bg-indigo-600 text-white rounded-xl px-4 py-2">📝 Brouillon</button>
          <select id="niveau-select" onchange="changeNiveau()" class="bg-white border rounded-xl px-2 py-2"></select>
      </div>
    </header>
    <main id="app-container" class="space-y-6"></main>
  </div>

  <div id="draft-panel" class="hidden w-96 bg-white rounded-3xl shadow-xl border p-6 h-fit sticky top-6">
    <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-black">Brouillon</h2><button onclick="toggleDraft()">✕</button></div>
    <math-field id="math-draft" smart-mode virtual-keyboard-mode="manual"></math-field>
    <div class="mt-4 grid grid-cols-6 gap-1">
        <button onclick="insertMath('\\frac{#?}{#?}')" class="symbol-btn text-sm">a/b</button>
        <button onclick="insertMath('\\sqrt{#?}')" class="symbol-btn text-sm">√</button>
        <button onclick="insertMath('^2')" class="symbol-btn text-sm">x²</button>
    </div>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhRhPafn3a2hMH9WEw6E89FdR9QyKappv0OrGUr6OYiL11ScZqMkxG9pEN_G-GnlBnOw/exec";
const ADMIN_PASSWORD = "NICO"; // Ton mot de passe admin

let state = {
  activeProfile: null, niveau: "5EME", results: {}, xp: 0, streak: 0,
  questView: {}, expanded: {}, revealed: false, currentId: null,
  hintStepsRevealed: {}, formulaRevealed: {}, formulaManuallyTouched: {},
  timer: { interval: null, seconds: 0, activeId: null }, isDrawing: false, draftOpen: false
};

const STORAGE_KEY_PROFILES = 'boost_registered_students'; // Liste globale des codes valides
const LEVEL_ORDER = ["6EME", "5EME", "4EME", "3EME", "SECONDE", "PREMIERE", "TERMINALE"];
const LEVEL_NAMES = { "6EME": "6ème", "5EME": "5ème", "4EME": "4ème", "3EME": "3ème", "SECONDE": "Seconde", "PREMIERE": "1ère", "TERMINALE": "Terminale" };
const LEVELS = {}; Object.keys(LEVEL_NAMES).forEach(k => { LEVELS[k] = { categories: {}, catDisplay: {}, catIcon: {}, name: LEVEL_NAMES[k] }; });

// --- GESTION ADMIN & CODES ---
function askAdmin() {
  const pass = prompt("Mot de passe Coach :");
  if (pass === ADMIN_PASSWORD) document.getElementById('admin-modal').classList.remove('hidden');
}

function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

function generateStudentAccess() {
  const name = document.getElementById('new-student-name').value.trim();
  const level = document.getElementById('new-student-level').value;
  if (!name) return alert("Nom requis");

  // ALGO : 3 premières lettres Prénom + Chiffre classe (ex: 6, 5, 4, 3, 2, 1, T)
  let classDigit = level.charAt(0); 
  const code = (name.substring(0, 3).toUpperCase() + classDigit).replace(/\s/g, '');

  const profiles = JSON.parse(localStorage.getItem(STORAGE_KEY_PROFILES)) || {};
  profiles[code] = { name: name, level: level, xp: 0, streak: 0, results: {} };
  localStorage.setItem(STORAGE_KEY_PROFILES, JSON.stringify(profiles));

  document.getElementById('final-code').innerText = code;
  document.getElementById('generated-result').classList.remove('hidden');
}

// --- CONNEXION ÉLÈVE ---
function loginWithCode() {
  const code = document.getElementById('student-code-input').value.trim().toUpperCase();
  const profiles = JSON.parse(localStorage.getItem(STORAGE_KEY_PROFILES)) || {};
  
  if (profiles[code]) {
    state.activeProfile = profiles[code];
    state.activeProfile.code = code;
    initStudentApp();
  } else {
    alert("Code inconnu. Vérifie avec ton coach !");
  }
}

function initStudentApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('active-student-name').innerText = state.activeProfile.name;
  
  state.niveau = state.activeProfile.level;
  state.results = state.activeProfile.results || {};
  state.xp = state.activeProfile.xp || 0;
  
  updateLevelDropdown(state.niveau);
  updateHeader();
  render();
}

function logout() { location.reload(); }

// --- LOGIQUE APP ---
function populateLevelsFromDb() { Object.keys(LEVELS).forEach(key => { const raw = window.db ? window.db[`ALGEBRA_${key}`] : null; if (raw) LEVELS[key] = { categories: raw.categories || raw, catDisplay: raw.catDisplay || {}, catIcon: raw.catIcon || {}, name: LEVEL_NAMES[key] }; }); }

function updateLevelDropdown(userLevel) {
  const select = document.getElementById('niveau-select');
  select.innerHTML = '';
  const maxIdx = LEVEL_ORDER.indexOf(userLevel);
  for(let i = 0; i <= maxIdx; i++) {
    const lvlKey = LEVEL_ORDER[i];
    const opt = document.createElement('option');
    opt.value = lvlKey;
    opt.text = LEVEL_NAMES[lvlKey];
    select.appendChild(opt);
  }
  select.value = userLevel;
}

function updateHeader() {
  document.getElementById('ui-streak').innerText = state.activeProfile.streak || 0;
  document.getElementById('ui-xp').innerText = state.xp;
}

function saveProgress() {
  const profiles = JSON.parse(localStorage.getItem(STORAGE_KEY_PROFILES)) || {};
  if (state.activeProfile.code) {
    profiles[state.activeProfile.code].results = state.results;
    profiles[state.activeProfile.code].xp = state.xp;
    localStorage.setItem(STORAGE_KEY_PROFILES, JSON.stringify(profiles));
  }
}

function mark(cat, idx, status, total) {
  const id = `${state.niveau}-${cat}-${idx}`;
  state.results[id] = status;
  state.formulaRevealed[id] = true;

  if(status !== 'HARD') {
    let gained = 100 - ((state.hintStepsRevealed[id]||0)*15);
    state.xp += Math.max(10, Math.floor(gained));
  }
  
  saveProgress();
  updateHeader();
  
  fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ eleve: state.activeProfile.name, classe: state.niveau, categorie: cat, resultat: status, xp: state.xp }) });

  render();
  setTimeout(() => { nextExercise(cat); }, 1500);
}

// (Le reste des fonctions renderSection, render, toggleDraft, etc. reste identique à tes versions précédentes)
function toggleDraft() { state.draftOpen = !state.draftOpen; document.getElementById('draft-panel').classList.toggle('hidden'); }
function insertMath(l) { document.getElementById('math-draft').insert(l); }
function changeNiveau() { state.niveau = document.getElementById('niveau-select').value; render(); }
function goToExercise(cat, i) { state.questView[cat] = i; state.revealed = false; render(); }
function nextExercise(cat) { const idx = state.questView[cat] || 0; const total = LEVELS[state.niveau].categories[cat].length; if(idx < total-1) state.questView[cat]++; state.revealed = false; render(); }
function verify(cat, idx) { state.revealed = true; state.currentId = `${state.niveau}-${cat}-${idx}`; render(); }
function toggleCategory(cat) { state.expanded[cat] = !state.expanded[cat]; render(); }
function showNextHint(id, total) {
  if(!state.hintStepsRevealed[id]) state.hintStepsRevealed[id] = 0;
  if(state.hintStepsRevealed[id] < total) {
    document.getElementById(`hint-${id}-${state.hintStepsRevealed[id]}`).classList.remove('hidden');
    state.hintStepsRevealed[id]++;
  }
}
function revealFormula(id, el) { el.classList.add('revealed'); }

function render() {
  const container = document.getElementById('app-container');
  let html = `<div class="space-y-4">`;
  const cats = LEVELS[state.niveau].categories || {};
  Object.keys(cats).forEach(cat => {
    const total = cats[cat].length;
    let completed = 0;
    for(let i=0; i<total; i++) { if(state.results[`${state.niveau}-${cat}-${i}`] === 'EASY' || state.results[`${state.niveau}-${cat}-${i}`] === 'MEDIUM') completed++; }
    const pct = Math.round((completed/total)*100);

    html += `<div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
      <div onclick="toggleCategory('${cat}')" class="px-6 py-4 flex justify-between items-center cursor-pointer bg-slate-50">
        <div><span class="text-xl font-bold">${LEVELS[state.niveau].catDisplay[cat]||cat}</span><div class="text-xs text-slate-500">${pct}% terminé</div></div>
        <span class="text-xl">${state.expanded[cat]?'▲':'▼'}</span>
      </div>
      ${state.expanded[cat] ? renderSection(cat, cats[cat][state.questView[cat]||0], state.questView[cat]||0, total) : ''}
    </div>`;
  });
  container.innerHTML = html + `</div>`;
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise();
}

function renderSection(cat, data, idx, total) {
  if (!data) return `<div class="p-10 text-center font-bold text-emerald-600">Félicitations ! Catégorie terminée.</div>`;
  const id = `${state.niveau}-${cat}-${idx}`; 
  const isRev = state.revealed && state.currentId === id;
  
  let pills = `<div class="flex flex-wrap gap-1 p-4 justify-center">`;
  for(let i=0; i<total; i++) {
    const st = state.results[`${state.niveau}-${cat}-${i}`];
    let c = "w-8 h-8 rounded-full text-xs font-bold flex items-center justify-center cursor-pointer ";
    c += (st === 'EASY' || st === 'MEDIUM') ? "bg-emerald-500 text-white" : (st === 'HARD' ? "bg-rose-500 text-white" : "bg-slate-200");
    if(i===idx) c+=" ring-2 ring-blue-500";
    pills += `<button onclick="goToExercise('${cat}', ${i})" class="${c}">${i+1}</button>`;
  } pills += `</div>`;

  return `
    <div class="p-6 border-t">
      ${pills}
      <div class="main-box bg-white border-2 border-blue-100 rounded-2xl p-6 mb-6">
        <div class="math-display mb-6">${data.q}</div>
        ${isRev ? `<div class="mt-4 pt-4 border-t-2 border-dashed border-emerald-200 text-3xl font-black text-emerald-600 animate-bounce-in">${data.a}</div>` : ''}
      </div>
      <div class="flex gap-2">
        ${!isRev ? `<button onclick="verify('${cat}', ${idx})" class="w-full py-4 bg-slate-900 text-white font-black rounded-xl">VÉRIFIER</button>` : `
          <button onclick="mark('${cat}', ${idx}, 'HARD', ${total})" class="flex-1 py-3 bg-rose-100 text-rose-700 rounded-xl font-bold">FAUX</button>
          <button onclick="mark('${cat}', ${idx}, 'EASY', ${total})" class="flex-1 py-3 bg-emerald-100 text-emerald-700 rounded-xl font-bold">RÉUSSI</button>
        `}
      </div>
      <div class="mt-4 grid grid-cols-2 gap-4">
        <button onclick="showNextHint('${id}', ${data.steps ? data.steps.length : 0})" class="text-sm font-bold text-amber-600 bg-amber-50 p-2 rounded-lg">Besoin d'un indice ?</button>
        <div class="blurred-formula text-xs bg-indigo-50 p-2 rounded-lg" onclick="revealFormula('${id}', this)">${data.f || 'Clique pour la formule'}</div>
      </div>
      <div class="mt-2">
        ${(data.steps||[]).map((s,i) => `<div id="hint-${id}-${i}" class="hidden text-sm p-2 bg-amber-100 rounded mt-1 border-l-4 border-amber-400">${s}</div>`).join('')}
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', () => { populateLevelsFromDb(); });
</script>
</body>
</html>
