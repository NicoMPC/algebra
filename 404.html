<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — Matheux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f8fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      max-width: 440px;
      width: 100%;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(67,56,202,.12);
      text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 1.5rem; color: #07090f; margin-bottom: .5rem; }
    p { color: #64748b; font-size: .9rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #4338ca, #6366f1);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔍</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée.</p>
    <a href="https://matheux.fr/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
